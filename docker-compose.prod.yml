services:
  # ── Override: no direct port exposure in production ──
  # All traffic goes through NPM (ports 80/443)
  api:
    ports: !override []

  dashboard:
    ports: !override []

  # ── Reverse Proxy (NPMplus with CrowdSec) ──
  npm:
    image: zoeyvid/npmplus:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"
    volumes:
      - npm_data:/data
    depends_on:
      - api
      - dashboard

volumes:
  npm_data:
