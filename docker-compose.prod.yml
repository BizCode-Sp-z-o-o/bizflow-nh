services:
  # ── Override: remove direct port exposure in production ──
  api:
    ports: !override
      - "127.0.0.1:${API_PORT:-5001}:8080"

  dashboard:
    ports: !override
      - "127.0.0.1:${DASHBOARD_PORT:-4322}:4322"

  docs:
    ports: !override
      - "127.0.0.1:${DOCS_PORT:-4323}:4323"

  # ── Reverse Proxy (NPMplus) — SSL termination + domain routing ──
  npm:
    image: zoeyvid/npmplus:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
    depends_on:
      - api
      - dashboard

volumes:
  npm_data:
